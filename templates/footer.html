{{define "footer"}}
<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <div class="footer-links">
                {{if .Copyright}}
                <span>{{.Copyright}}</span>
                <span aria-hidden="true">·</span>
                {{end}}
                <span>Powered by <a href="https://mdoc.cc/mliev/dwz" target="_blank" rel="noopener noreferrer">木雷短网址</a></span>
            </div>
        </div>
        {{if or .ICPNumber .PoliceNumber}}
        <div class="footer-content footer-beian">
            <div class="beian-info">
                {{if .ICPNumber}}
                <a href="http://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">{{.ICPNumber}}</a>
                {{end}}
                {{if .PoliceNumber}}
                <span>公安备案号：{{.PoliceNumber}}</span>
                {{end}}
            </div>
        </div>
        {{end}}
    </div>
</footer>
{{end}}
