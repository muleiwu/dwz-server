{{define "styles"}}
<style>
    :root {
        --primary: #0369a1;
        --primary-dark: #075985;
        --primary-soft: #e0f2fe;
        --secondary: #0ea5e9;
        --accent: #38bdf8;
        --success: #22c55e;
        --success-dark: #15803d;
        --success-soft: #dcfce7;
        --warning: #f59e0b;
        --danger: #dc2626;
        --danger-soft: #fee2e2;
        --background: #f0f9ff;
        --background-2: #f8fafc;
        --surface: #ffffff;
        --surface-strong: #f8fafc;
        --border: #dbeafe;
        --border-strong: #bae6fd;
        --glass-bg: rgba(255, 255, 255, 0.86);
        --glass-border: rgba(186, 230, 253, 0.72);
        --text-main: #0c4a6e;
        --text-strong: #082f49;
        --text-muted: #475569;
        --text-subtle: #64748b;
        --ring: rgba(14, 165, 233, 0.28);
        --shadow-sm: 0 1px 2px rgba(8, 47, 73, 0.06);
        --shadow-md: 0 12px 32px rgba(8, 47, 73, 0.10);
        --shadow-lg: 0 22px 58px rgba(8, 47, 73, 0.16);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 18px;
        --content-max: 1160px;
        --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html {
        min-width: 320px;
        scroll-behavior: smooth;
    }

    body {
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        color: var(--text-main);
        background:
            linear-gradient(180deg, rgba(224, 242, 254, 0.85) 0%, rgba(248, 250, 252, 0.94) 42%, #ffffff 100%),
            radial-gradient(circle at 18% 12%, rgba(14, 165, 233, 0.12), transparent 30%),
            radial-gradient(circle at 86% 4%, rgba(34, 197, 94, 0.10), transparent 26%);
        font-family: var(--font-sans);
        line-height: 1.6;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    a {
        color: inherit;
    }

    svg {
        display: block;
    }

    button,
    input,
    select,
    textarea {
        font: inherit;
    }

    button,
    a,
    .feature,
    .btn,
    .cta-button {
        -webkit-tap-highlight-color: transparent;
    }

    :focus-visible {
        outline: 3px solid var(--ring);
        outline-offset: 3px;
        border-radius: var(--radius-sm);
    }

    .container {
        width: min(var(--content-max), calc(100% - 48px));
        margin: 0 auto;
    }

    .main {
        flex: 1;
        width: 100%;
        padding: 112px 0 56px;
    }

    .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.86);
        border-bottom: 1px solid rgba(186, 230, 253, 0.72);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
    }

    .nav {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
    }

    .logo {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text-strong);
        font-size: 1.08rem;
        font-weight: 800;
        letter-spacing: 0;
        text-decoration: none;
        white-space: nowrap;
    }

    .logo-mark {
        width: 36px;
        height: 36px;
        display: inline-grid;
        place-items: center;
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        flex: 0 0 auto;
    }

    .logo-mark svg {
        width: 36px;
        height: 36px;
        display: block;
    }

    .logo-image {
        display: block;
        max-width: 36px;
        max-height: 36px;
        object-fit: contain;
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: 10px;
        list-style: none;
    }

    .nav-links a {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 14px;
        border-radius: var(--radius-sm);
        color: var(--text-muted);
        font-size: 0.94rem;
        font-weight: 650;
        text-decoration: none;
        transition: color 180ms ease, background 180ms ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
        color: var(--primary-dark);
        background: var(--primary-soft);
    }

    .nav-toggle {
        display: none;
        width: 42px;
        height: 42px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--text-main);
        cursor: pointer;
        transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .nav-toggle:hover {
        border-color: var(--border-strong);
        box-shadow: var(--shadow-sm);
    }

    .nav-toggle span {
        width: 18px;
        height: 2px;
        display: block;
        margin: 4px auto;
        border-radius: 999px;
        background: currentColor;
        transition: transform 180ms ease, opacity 180ms ease;
    }

    .nav-toggle.active span:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
    }

    .nav-toggle.active span:nth-child(2) {
        opacity: 0;
    }

    .nav-toggle.active span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
    }

    .hero {
        flex: 1;
        padding: 132px 0 72px;
    }

    .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
        gap: 56px;
        align-items: center;
    }

    .eyebrow,
    .status-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        padding: 0 12px;
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        color: var(--primary-dark);
        background: rgba(224, 242, 254, 0.8);
        font-size: 0.84rem;
        font-weight: 760;
    }

    .eyebrow-dot,
    .status-kicker::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--success);
        box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.12);
    }

    .hero h1 {
        margin-top: 24px;
        color: var(--text-strong);
        font-size: clamp(2.65rem, 7vw, 5.2rem);
        line-height: 1;
        font-weight: 850;
        letter-spacing: 0;
    }

    .hero p {
        max-width: 640px;
        margin-top: 24px;
        color: var(--text-muted);
        font-size: clamp(1rem, 2vw, 1.22rem);
    }

    .hero-actions,
    .action-buttons,
    .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
    }

    .hero-actions {
        margin-top: 34px;
    }

    .cta-button,
    .btn,
    .btn-copy {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        padding: 0 18px;
        font-size: 0.95rem;
        font-weight: 760;
        text-decoration: none;
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .cta-button svg,
    .btn svg,
    .btn-copy svg {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
    }

    .cta-button,
    .btn-primary {
        color: #ffffff;
        background: var(--primary);
        border-color: var(--primary);
        box-shadow: 0 12px 24px rgba(3, 105, 161, 0.22);
    }

    .cta-button:hover,
    .btn-primary:hover {
        transform: translateY(-1px);
        background: var(--primary-dark);
        border-color: var(--primary-dark);
        box-shadow: 0 16px 30px rgba(3, 105, 161, 0.25);
    }

    .cta-button.secondary,
    .btn-secondary {
        color: var(--text-main);
        background: #ffffff;
        border-color: var(--border);
        box-shadow: var(--shadow-sm);
    }

    .cta-button.secondary:hover,
    .btn-secondary:hover {
        transform: translateY(-1px);
        color: var(--primary-dark);
        border-color: var(--border-strong);
        background: #f8fcff;
    }

    .btn-success {
        color: #ffffff;
        background: var(--success);
        border-color: var(--success);
        box-shadow: 0 12px 24px rgba(34, 197, 94, 0.22);
    }

    .btn-success:hover {
        transform: translateY(-1px);
        background: var(--success-dark);
        border-color: var(--success-dark);
    }

    .btn:disabled,
    button:disabled {
        opacity: 0.48;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
    }

    .hero-panel {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.88);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
    }

    .hero-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    .panel-title {
        color: var(--text-strong);
        font-weight: 800;
    }

    .panel-badge {
        color: var(--success-dark);
        background: var(--success-soft);
        border: 1px solid #bbf7d0;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.78rem;
        font-weight: 760;
        white-space: nowrap;
    }

    .url-preview {
        margin: 22px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface-strong);
    }

    .url-preview-label {
        color: var(--text-subtle);
        font-size: 0.78rem;
        font-weight: 760;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .url-preview-value {
        margin-top: 8px;
        color: var(--primary-dark);
        font-size: 1.05rem;
        font-weight: 800;
        word-break: break-all;
    }

    .trust-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0 22px 22px;
    }

    .trust-item {
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: #ffffff;
    }

    .trust-value {
        color: var(--text-strong);
        font-size: 1.35rem;
        font-weight: 850;
        line-height: 1;
    }

    .trust-label {
        margin-top: 6px;
        color: var(--text-muted);
        font-size: 0.84rem;
    }

    .section {
        padding: 72px 0;
    }

    .section-heading {
        max-width: 720px;
        margin-bottom: 28px;
    }

    .section-heading h2,
    .cta-section h2 {
        color: var(--text-strong);
        font-size: clamp(1.75rem, 4vw, 2.6rem);
        line-height: 1.16;
        font-weight: 850;
        letter-spacing: 0;
    }

    .section-heading p,
    .cta-section p {
        margin-top: 12px;
        color: var(--text-muted);
        font-size: 1rem;
    }

    .features {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
    }

    .feature {
        min-height: 210px;
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: #ffffff;
        box-shadow: var(--shadow-sm);
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .feature:hover {
        transform: translateY(-3px);
        border-color: var(--border-strong);
        box-shadow: var(--shadow-md);
    }

    .feature-icon,
    .status-icon {
        width: 46px;
        height: 46px;
        display: inline-grid;
        place-items: center;
        color: var(--primary);
        background: var(--primary-soft);
        border: 1px solid var(--border-strong);
        border-radius: 12px;
    }

    .feature-icon svg,
    .status-icon svg {
        width: 24px;
        height: 24px;
    }

    .feature h3 {
        margin-top: 18px;
        color: var(--text-strong);
        font-size: 1.08rem;
        font-weight: 800;
    }

    .feature p {
        margin-top: 8px;
        color: var(--text-muted);
        font-size: 0.94rem;
    }

    .cta-section {
        padding: 72px 0;
        text-align: center;
        border-top: 1px solid var(--border);
        background: linear-gradient(180deg, #ffffff 0%, #f8fcff 100%);
    }

    .cta-section .action-buttons {
        justify-content: center;
        margin-top: 28px;
    }

    .error-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 116px 0 56px;
    }

    .error-content,
    .status-card {
        width: min(720px, 100%);
        margin: 0 auto;
        padding: clamp(28px, 5vw, 44px);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow-lg);
        text-align: left;
    }

    .error-content {
        text-align: center;
    }

    .error-icon,
    .error-content .status-icon {
        margin: 0 auto 20px;
    }

    .error-title {
        color: var(--text-strong);
        font-size: clamp(1.9rem, 5vw, 3.15rem);
        line-height: 1.1;
        font-weight: 850;
        letter-spacing: 0;
    }

    .error-message {
        max-width: 560px;
        margin: 16px auto 0;
        color: var(--text-muted);
        font-size: 1.02rem;
    }

    .error-code {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        margin-top: 20px;
        padding: 0 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--primary-dark);
        background: var(--primary-soft);
        font-size: 0.86rem;
        font-weight: 760;
    }

    .error-content .action-buttons {
        justify-content: center;
        margin-top: 28px;
    }

    .suggestions {
        margin-top: 30px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface-strong);
        text-align: left;
    }

    .suggestions h3 {
        color: var(--text-strong);
        font-size: 1rem;
        font-weight: 800;
    }

    .suggestions ul {
        display: grid;
        gap: 8px;
        margin-top: 12px;
        list-style: none;
    }

    .suggestions li {
        color: var(--text-muted);
        font-size: 0.94rem;
    }

    .password-form {
        display: grid;
        gap: 12px;
        max-width: 420px;
        margin: 28px auto 0;
        text-align: left;
    }

    .form-label,
    body .form-label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-strong);
        font-size: 0.92rem;
        font-weight: 760;
    }

    .password-input,
    body .form-input {
        width: 100%;
        min-height: 44px;
        padding: 0 13px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text-main);
        background: #ffffff;
        transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .password-input:focus,
    body .form-input:focus {
        outline: none;
        border-color: var(--secondary);
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.16);
    }

    body .form-help {
        display: block;
        margin-top: 6px;
        color: var(--text-subtle);
        font-size: 0.84rem;
    }

    .footer {
        margin-top: auto;
        padding: 28px 0;
        border-top: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.76);
    }

    .footer-content {
        display: flex;
        justify-content: center;
        color: var(--text-subtle);
        font-size: 0.9rem;
        text-align: center;
    }

    .footer-links,
    .beian-info {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 8px 12px;
    }

    .footer a {
        color: var(--primary-dark);
        font-weight: 700;
        text-decoration: none;
    }

    .footer a:hover {
        text-decoration: underline;
    }

    .footer-beian {
        margin-top: 12px;
    }

    body .install-container {
        width: min(960px, calc(100% - 32px)) !important;
        max-width: none !important;
        margin: 0 auto !important;
        padding: clamp(24px, 4vw, 44px) !important;
        border: 1px solid var(--border) !important;
        border-radius: var(--radius-lg) !important;
        background: rgba(255, 255, 255, 0.94) !important;
        box-shadow: var(--shadow-lg) !important;
    }

    body .install-header {
        text-align: left !important;
        margin-bottom: 28px !important;
    }

    body .install-title {
        color: var(--text-strong) !important;
        font-size: clamp(2rem, 5vw, 3rem) !important;
        line-height: 1.1 !important;
        font-weight: 850 !important;
        letter-spacing: 0 !important;
    }

    body .install-subtitle {
        max-width: 680px !important;
        margin-top: 10px !important;
        color: var(--text-muted) !important;
        font-size: 1rem !important;
    }

    body .progress-bar {
        height: 8px !important;
        border-radius: 999px !important;
        background: var(--primary-soft) !important;
        overflow: hidden !important;
        margin-bottom: 28px !important;
    }

    body .progress-fill {
        height: 100% !important;
        border-radius: inherit !important;
        background: linear-gradient(90deg, var(--primary), var(--success)) !important;
        transition: width 220ms ease !important;
    }

    body .step-indicator {
        display: grid !important;
        grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
        gap: 12px !important;
        margin-bottom: 28px !important;
        padding: 0 !important;
    }

    body .step {
        display: grid !important;
        grid-template-columns: auto minmax(0, 1fr) !important;
        align-items: center !important;
        gap: 10px !important;
        padding: 12px !important;
        border: 1px solid var(--border) !important;
        border-radius: var(--radius-md) !important;
        background: var(--surface-strong) !important;
    }

    body .step-number {
        width: 34px !important;
        height: 34px !important;
        margin: 0 !important;
        color: var(--primary-dark) !important;
        background: var(--primary-soft) !important;
        border: 1px solid var(--border-strong) !important;
        border-radius: 10px !important;
        font-weight: 850 !important;
    }

    body .step.active {
        border-color: var(--border-strong) !important;
        background: #ffffff !important;
        box-shadow: var(--shadow-sm) !important;
    }

    body .step.active .step-number {
        color: #ffffff !important;
        background: var(--primary) !important;
        border-color: var(--primary) !important;
    }

    body .step.completed .step-number {
        color: #ffffff !important;
        background: var(--success) !important;
        border-color: var(--success) !important;
    }

    body .step-label {
        color: var(--text-muted) !important;
        font-size: 0.88rem !important;
        font-weight: 760 !important;
        text-align: left !important;
    }

    body .step.active .step-label {
        color: var(--primary-dark) !important;
    }

    body .step-connector {
        display: none !important;
    }

    body .step-content {
        padding: 28px 0 0 !important;
        color: var(--text-main) !important;
    }

    body .step-content h2 {
        color: var(--text-strong) !important;
        font-size: 1.55rem !important;
        font-weight: 850 !important;
    }

    body .step-content h3 {
        color: var(--text-strong) !important;
        font-size: 1rem !important;
        font-weight: 850 !important;
        margin: 24px 0 12px !important;
    }

    body .step-content p {
        color: var(--text-muted) !important;
    }

    body .form-grid {
        display: grid !important;
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 16px !important;
    }

    body .form-group {
        margin-bottom: 18px !important;
    }

    body .license-content,
    body .config-summary {
        border: 1px solid var(--border) !important;
        border-radius: var(--radius-md) !important;
        background: var(--surface-strong) !important;
        color: var(--text-muted) !important;
    }

    body .license-content {
        height: 300px !important;
        padding: 20px !important;
        overflow-y: auto !important;
        line-height: 1.75 !important;
    }

    body .license-content strong {
        color: var(--text-strong) !important;
    }

    body .checkbox-group {
        display: flex !important;
        align-items: flex-start !important;
        gap: 10px !important;
        margin: 18px 0 0 !important;
        color: var(--text-main) !important;
    }

    body .checkbox-group input[type="checkbox"] {
        width: 18px !important;
        height: 18px !important;
        margin-top: 3px !important;
        accent-color: var(--primary) !important;
        flex: 0 0 auto !important;
    }

    body .alert {
        padding: 14px 16px !important;
        border-radius: var(--radius-sm) !important;
        margin: 14px 0 !important;
        font-size: 0.93rem !important;
    }

    body .alert-success {
        color: #166534 !important;
        background: var(--success-soft) !important;
        border: 1px solid #bbf7d0 !important;
    }

    body .alert-error {
        color: #991b1b !important;
        background: var(--danger-soft) !important;
        border: 1px solid #fecaca !important;
    }

    body .alert-info {
        color: var(--primary-dark) !important;
        background: var(--primary-soft) !important;
        border: 1px solid var(--border-strong) !important;
    }

    body .loading {
        padding: 18px !important;
        text-align: center !important;
    }

    body .loading p {
        color: var(--text-muted) !important;
    }

    body .spinner {
        width: 36px !important;
        height: 36px !important;
