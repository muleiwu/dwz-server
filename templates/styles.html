{{define "styles"}}
<style>
    :root {
        --primary: #0ea5e9;
        --primary-dark: #0284c7;
        --secondary: #06b6d4;
        --accent: #38bdf8;
        --background: #fafbfc;
        --surface: #ffffff;
        --text-main: #1a1a2e;
        --text-muted: #64748b;
        --glass-bg: rgba(255, 255, 255, 0.8);
        --glass-border: rgba(0, 0, 0, 0.06);
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.6;
        color: var(--text-main);
        background-color: var(--background);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-image:
            radial-gradient(circle at 20% 50%, rgba(14, 165, 233, 0.04) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(6, 182, 212, 0.03) 0%, transparent 50%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    .main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 8rem 1rem 4rem;
    }

    /* Header */
    .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--glass-border);
        padding: 1rem 0;
        transition: all 0.3s ease;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
    }

    .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo {
        font-size: 1.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-decoration: none;
        letter-spacing: -0.5px;
    }

    .nav-links {
        display: flex;
        list-style: none;
        gap: 2rem;
        align-items: center;
    }

    .nav-links a {
        text-decoration: none;
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }

    .nav-links a:hover {
        color: var(--text-main);
    }

    .nav-links a.active {
        color: var(--primary);
    }

    /* Hero Section */
    .hero {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8rem 0 4rem;
        text-align: center;
        position: relative;
    }

    .hero-content {
        max-width: 800px;
        margin: 0 auto;
        animation: fadeUp 0.8s ease-out;
    }

    .hero h1 {
        font-size: 4rem;
        line-height: 1.1;
        margin-bottom: 1.5rem;
        font-weight: 800;
        letter-spacing: -1px;
        color: var(--text-main);
    }

    .hero p {
        font-size: 1.25rem;
        color: var(--text-muted);
        margin-bottom: 3rem;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
    }

    /* Mock Input for Visual Appeal */
    .hero-input-mock {
        background: var(--surface);
        border: 1px solid var(--glass-border);
        padding: 0.5rem;
        border-radius: 1rem;
        display: flex;
        max-width: 500px;
        margin: 0 auto 4rem;
        box-shadow: var(--shadow-md);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .hero-input-mock:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        border-color: rgba(14, 165, 233, 0.2);
    }

    .hero-input-mock span {
        flex: 1;
        padding: 1rem;
        color: var(--text-muted);
        text-align: left;
        font-size: 0.95rem;
    }

    .hero-input-mock button {
        background: var(--primary);
        color: white;
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
    }

    .hero-input-mock button:hover {
        background: var(--primary-dark);
    }

    /* Features Grid */
    .features {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
        margin-top: 2rem;
    }

    .feature {
        background: var(--surface);
        padding: 2rem;
        border-radius: 1rem;
        border: 1px solid var(--glass-border);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        animation: fadeUp 0.6s ease-out both;
        box-shadow: var(--shadow-sm);
    }

    .feature:nth-child(1) { animation-delay: 0.1s; }
    .feature:nth-child(2) { animation-delay: 0.2s; }
    .feature:nth-child(3) { animation-delay: 0.3s; }
    .feature:nth-child(4) { animation-delay: 0.4s; }
    .feature:nth-child(5) { animation-delay: 0.5s; }
    .feature:nth-child(6) { animation-delay: 0.6s; }

    .feature:hover {
        transform: translateY(-4px);
        border-color: rgba(14, 165, 233, 0.15);
        box-shadow: var(--shadow-lg);
    }

    .feature-icon {
        font-size: 2rem;
        margin-bottom: 1.25rem;
        display: inline-block;
        padding: 0.75rem;
        background: rgba(14, 165, 233, 0.06);
        border-radius: 0.75rem;
        color: var(--primary);
    }

    .feature h3 {
        font-size: 1.15rem;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-main);
    }

    .feature p {
        color: var(--text-muted);
        font-size: 0.9rem;
        line-height: 1.7;
    }

    /* CTA Section */
    .cta-section {
        padding: 5rem 0;
        text-align: center;
        position: relative;
    }

    .cta-section h2 {
        font-size: 2rem;
        font-weight: 700;
        color: var(--text-main);
    }

    .cta-button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--primary);
        color: white;
        padding: 0.85rem 2rem;
        border-radius: 0.75rem;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(14, 165, 233, 0.2);
    }

    .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(14, 165, 233, 0.25);
        background: var(--primary-dark);
    }

    .action-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 2rem;
    }

    /* Footer */
    .footer {
        background: #f8fafc;
        border-top: 1px solid var(--glass-border);
        padding: 2.5rem 0;
        margin-top: auto;
    }

    .footer-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
    }

    .footer-links {
        display: flex;
        gap: 2rem;
    }

    .footer-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s;
    }

    .footer-links a:hover {
        color: var(--primary);
    }

    .beian-info {
        display: flex;
        gap: 1.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
        opacity: 0.7;
    }

    .beian-info a {
        color: inherit;
        text-decoration: none;
        transition: color 0.3s;
    }

    .beian-info a:hover {
        color: var(--text-main);
    }

    /* Error Pages */
    .error-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8rem 1rem 4rem;
        text-align: center;
    }

    .error-content {
        max-width: 520px;
        margin: 0 auto;
        animation: fadeUp 0.8s ease-out;
    }

    .error-icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        display: inline-block;
        animation: iconPulse 2s ease-in-out infinite;
    }

    .error-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.75rem;
        color: var(--text-main);
    }

    .error-message {
        color: var(--text-muted);
        font-size: 1rem;
        line-height: 1.8;
        margin-bottom: 1.5rem;
    }

    .error-code {
        display: inline-block;
        padding: 0.35rem 1rem;
        background: rgba(14, 165, 233, 0.06);
        border: 1px solid rgba(14, 165, 233, 0.12);
        border-radius: 2rem;
        color: var(--primary);
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 2rem;
    }

    /* Shared Button Styles */
    .btn {
        display: inline-block;
        padding: 0.7rem 1.6rem;
        border-radius: 0.75rem;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
        border: none;
    }

    .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 2px 8px rgba(14, 165, 233, 0.2);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(14, 165, 233, 0.25);
        background: var(--primary-dark);
    }

    .btn-secondary {
        background: var(--surface);
        color: var(--text-muted);
        border: 1px solid var(--glass-border);
    }

    .btn-secondary:hover {
        background: #f1f5f9;
        color: var(--text-main);
        transform: translateY(-2px);
    }

    /* Suggestions Box */
    .suggestions {
        background: #f8fafc;
        border: 1px solid var(--glass-border);
        border-radius: 0.75rem;
        padding: 1.25rem 1.5rem;
        text-align: left;
        margin-top: 2rem;
    }

    .suggestions h3 {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 0.5rem;
    }

    .suggestions ul {
        list-style: none;
        padding: 0;
    }

    .suggestions li {
        color: var(--text-muted);
        font-size: 0.88rem;
        padding: 0.3rem 0;
        line-height: 1.6;
    }

    /* Hamburger Menu */
    .nav-toggle {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.5rem;
        z-index: 1001;
    }

    .nav-toggle span {
        display: block;
        width: 22px;
        height: 2px;
        background: var(--text-main);
        margin: 5px 0;
        transition: all 0.3s ease;
        border-radius: 2px;
    }

    .nav-toggle.active span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 5px);
    }

    .nav-toggle.active span:nth-child(2) {
        opacity: 0;
    }

    .nav-toggle.active span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -5px);
    }

    /* Focus Visible */
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
    }

    /* Animations */
    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(16px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes iconPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
    }

    @keyframes slideIn {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
        .nav-toggle {
            display: block;
        }

        .nav-links {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 260px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--glass-border);
            flex-direction: column;
            padding: 5rem 2rem 2rem;
            gap: 1.5rem;
            z-index: 999;
            animation: slideIn 0.3s ease-out;
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.06);
        }

        .nav-links.open {
            display: flex;
        }

        .hero h1 {
            font-size: 2.5rem;
        }

        .hero-input-mock {
            display: none;
        }

        .features {
            grid-template-columns: 1fr;
        }
    }
</style>
{{end}}
