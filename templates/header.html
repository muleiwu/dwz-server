{{define "header"}}
<header class="header">
    <div class="container">
        <nav class="nav" aria-label="主导航">
            <a href="/" class="logo" aria-label="{{.SiteName}} 首页">
                <span class="logo-mark">{{template "icon_logo" .}}</span>
                <span>{{.SiteName}}</span>
            </a>
            <button
                class="nav-toggle"
                id="navToggle"
                type="button"
                aria-label="打开导航菜单"
                aria-controls="navLinks"
                aria-expanded="false"
                onclick="this.classList.toggle('active'); var nav = document.getElementById('navLinks'); var open = nav.classList.toggle('open'); this.setAttribute('aria-expanded', open ? 'true' : 'false'); this.setAttribute('aria-label', open ? '关闭导航菜单' : '打开导航菜单');"
            >
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">首页</a></li>
                <li><a href="/admin/">后台</a></li>
            </ul>
        </nav>
    </div>
</header>
{{end}}
