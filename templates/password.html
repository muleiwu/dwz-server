<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - {{.SiteName}}</title>
    {{template "styles" .}}
</head>
<body>
    {{template "header" .}}

    <main class="error-section">
        <div class="container">
            <div class="error-content">
                <div class="error-icon">🔒</div>
                <h1 class="error-title">{{.Title}}</h1>
                <p class="error-message">该短链接已开启访问密码 Password，请验证后继续访问。</p>
                {{if .Message}}<div class="error-code">{{.Message}}</div>{{end}}

                <form class="password-form" method="post" action="/api/v1/public/link_access/password">
                    <input type="hidden" name="domain" value="{{.Domain}}">
                    <input type="hidden" name="short_code" value="{{.ShortCode}}">
                    <input type="hidden" name="next" value="{{.Next}}">
                    <input class="password-input" name="password" type="password" autocomplete="current-password" placeholder="访问密码 Password" required autofocus>
                    <button class="btn btn-primary" type="submit">继续访问</button>
                </form>
            </div>
        </div>
    </main>

    {{template "footer" .}}
</body>
</html>
