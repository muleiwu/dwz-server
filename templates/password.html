<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - {{.SiteName}}</title>
    {{template "styles" .}}
</head>
<body>
    {{template "header" .}}

    <main class="error-section">
        <div class="container">
            <section class="error-content" aria-labelledby="pageTitle">
                <div class="status-icon error-icon">{{template "icon_lock" .}}</div>
                <div class="status-kicker">安全验证</div>
                <h1 class="error-title" id="pageTitle">{{.Title}}</h1>
                <p class="error-message">该短链接已开启访问密码。完成验证后，系统会继续前往目标页面。</p>
                {{if .Message}}<div class="error-code" role="alert">{{.Message}}</div>{{end}}

                <form class="password-form" method="post" action="/api/v1/public/link_access/password">
                    <input type="hidden" name="domain" value="{{.Domain}}">
                    <input type="hidden" name="short_code" value="{{.ShortCode}}">
                    <input type="hidden" name="next" value="{{.Next}}">
                    <div>
                        <label class="form-label" for="passwordInput">访问密码</label>
                        <input class="password-input" id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="请输入访问密码" required autofocus>
                    </div>
                    <button class="btn btn-primary" type="submit">继续访问</button>
                </form>
            </section>
        </div>
    </main>

    {{template "footer" .}}
</body>
</html>
