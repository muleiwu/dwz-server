apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: "34"
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: dwz-server
  name: dwz-server
  namespace: dwz
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      io.kompose.service: dwz-server
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (HEAD)
        kubectl.kubernetes.io/restartedAt: 2026-05-25T16:33:58Z
      labels:
        io.kompose.service: dwz-server
    spec:
      containers:
        - env:
            - name: GIN_MODE
              value: release
            - name: TZ
              value: Asia/Shanghai
          image: docker.cnb.cool/mliev/open/dwz-server:develop
          imagePullPolicy: Always
          name: dwz-server
          ports:
            - containerPort: 8080
              name: dwz-proxy
              protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /app/config/
              name: dwz-server-claim0
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            name: config-file
          name: dwz-server-claim0
